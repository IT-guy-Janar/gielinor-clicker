<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gielinor Clicker — An OSRS Idle Adventure</title>
<style>
  :root {
    --bg:        #120d08;
    --wood-dark: #2a1d10;
    --wood:      #4a3620;
    --wood-lite: #6b4f2c;
    --bevel-hi:  #8a6a3d;
    --bevel-lo:  #170f07;
    --parch:     #d8b878;
    --gold:      #ffcc22;
    --gold-dim:  #b8901f;
    --ink:       #f2e2bd;
    --ink-dim:   #b7a077;
    --hp-good:   #3fa63f;
    --hp-bad:    #a41414;
    --hit:       #9c0d05;
    --locked:    #3a2c1a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(ellipse at 50% -10%, #241708 0%, var(--bg) 60%);
    color: var(--ink);
    font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ---- classic RS beveled panel ---- */
  .panel {
    background:
      linear-gradient(180deg, var(--wood-lite), var(--wood) 40%, var(--wood-dark));
    border: 2px solid var(--bevel-lo);
    box-shadow:
      inset 2px 2px 0 var(--bevel-hi),
      inset -2px -2px 0 var(--bevel-lo),
      0 6px 16px rgba(0,0,0,.55);
    border-radius: 4px;
  }

  .gold-text {
    color: var(--gold);
    text-shadow: 1px 1px 0 #000, 2px 2px 0 rgba(0,0,0,.4);
  }
  .shadow-text { text-shadow: 1px 1px 0 #000; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 18px;
    margin: 14px auto 10px;
    max-width: 1160px;
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0;
    font-size: clamp(20px, 3.4vw, 30px);
    letter-spacing: .5px;
  }
  header h1 small {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-dim);
    text-transform: uppercase;
    text-shadow: none;
    font-weight: normal;
    margin-top: 2px;
  }

  .stats-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .stat {
    padding: 8px 14px;
    text-align: center;
    min-width: 92px;
  }
  .stat .label {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--ink-dim);
    text-transform: uppercase;
  }
  .stat .value { font-size: 18px; font-weight: bold; }

  .layout {
    display: grid;
    grid-template-columns: 200px 1fr 320px;
    gap: 14px;
    max-width: 1160px;
    margin: 0 auto 40px;
    padding: 0 14px;
    align-items: start;
  }

  /* ---------- AREA LIST (left) ---------- */
  .col-title {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-dim);
    padding: 10px 12px 6px;
    text-shadow: 1px 1px 0 #000;
  }
  .area-list { padding: 6px; }
  .area-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: linear-gradient(180deg,#5a4225,#3c2b16);
    border: 2px solid var(--bevel-lo);
    box-shadow: inset 1px 1px 0 var(--bevel-hi), inset -1px -1px 0 var(--bevel-lo);
    color: var(--ink);
    border-radius: 3px;
    padding: 8px 10px;
    margin: 4px 0;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: filter .12s;
  }
  .area-btn:hover:not(:disabled) { filter: brightness(1.18); }
  .area-btn.active {
    background: linear-gradient(180deg,#7a5a2e,#5a4020);
    box-shadow: inset 1px 1px 0 var(--gold), inset -1px -1px 0 var(--bevel-lo), 0 0 8px rgba(255,204,34,.35);
  }
  .area-btn:disabled { cursor: not-allowed; color: #6b5a3e; background: var(--locked); box-shadow: inset 1px 1px 0 #4a3a22; }
  .area-btn .a-name { font-weight: bold; display:flex; justify-content: space-between; align-items:center; }
  .area-btn .a-sub { font-size: 10px; color: var(--ink-dim); margin-top: 2px; }
  .area-btn .a-tier { font-size:10px; color: var(--gold); }

  /* ---------- COMBAT (center) ---------- */
  .combat { padding: 16px; position: relative; overflow: hidden; min-height: 460px; }
  .wave-row {
    display: flex; justify-content: space-between; align-items:center;
    font-size: 12px; color: var(--ink-dim); letter-spacing:1px; margin-bottom: 8px;
  }
  .boss-flag { color: #ff6a3d; font-weight: bold; text-shadow: 1px 1px 0 #000; }

  .monster-name { text-align:center; font-size: 22px; font-weight: bold; margin: 4px 0 2px; }
  .monster-sub  { text-align:center; font-size: 12px; color: var(--ink-dim); margin-bottom: 10px; }

  .monster-stage {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    height: 230px;
    margin: 0 auto 12px;
    user-select: none;
  }
  .monster {
    font-size: 150px;
    line-height: 1;
    cursor: pointer;
    filter: drop-shadow(0 12px 10px rgba(0,0,0,.6));
    transition: transform .05s;
  }
  .monster:active { transform: scale(.92); }
  .monster.boss { font-size: 172px; }
  .monster.hurt { animation: shake .18s; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)}
    50%{transform:translateX(6px)} 75%{transform:translateX(-4px)}
  }
  .monster.dying { animation: die .35s forwards; }
  @keyframes die {
    to { transform: scale(.2) rotate(20deg); opacity: 0; }
  }

  /* hitsplat: the signature OSRS moment */
  .hitsplat {
    position: absolute;
    min-width: 34px; height: 34px;
    padding: 0 6px;
    display:flex; align-items:center; justify-content:center;
    background: var(--hit);
    color: #fff; font-weight: bold; font-size: 15px;
    border-radius: 50%;
    box-shadow: 0 0 0 2px #000 inset, 0 2px 4px rgba(0,0,0,.5);
    pointer-events: none;
    text-shadow: 1px 1px 0 #000;
    animation: splat .8s ease-out forwards;
    z-index: 5;
  }
  .hitsplat.crit { background:#d38900; font-size:18px; min-width:40px; height:40px; }
  .hitsplat.zero { background:#0d5b9c; }
  @keyframes splat {
    0%   { transform: translate(-50%,-50%) scale(.4); opacity: 0; }
    18%  { transform: translate(-50%,-60%) scale(1.15); opacity: 1; }
    100% { transform: translate(-50%,-150%) scale(.9); opacity: 0; }
  }

  .gold-drop {
    position:absolute; pointer-events:none; z-index:6;
    color: var(--gold); font-weight:bold; font-size: 16px;
    text-shadow: 1px 1px 0 #000, 0 0 6px rgba(255,204,34,.6);
    animation: floatup 1.1s ease-out forwards;
  }
  @keyframes floatup {
    0%{ transform: translate(-50%,0); opacity:0; }
    15%{ opacity:1; }
    100%{ transform: translate(-50%,-70px); opacity:0; }
  }

  /* health bar */
  .hp-wrap {
    height: 26px; border: 2px solid var(--bevel-lo); border-radius: 3px;
    background: #200; position: relative; overflow:hidden;
    box-shadow: inset 1px 1px 0 var(--bevel-hi);
    margin: 0 auto; max-width: 460px;
  }
  .hp-fill {
    height: 100%;
    background: linear-gradient(180deg, #58c758, var(--hp-good));
    width: 100%; transition: width .08s linear;
  }
  .hp-text {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size: 13px; font-weight: bold; color:#fff; text-shadow: 1px 1px 0 #000;
  }

  .dps-note { text-align:center; font-size: 12px; color: var(--ink-dim); margin-top: 12px; }
  .click-hint { text-align:center; font-size: 11px; color: var(--gold-dim); margin-top: 4px; letter-spacing:1px; }

  /* ---------- SHOP (right) ---------- */
  .shop { padding: 8px; }
  .tabs { display:flex; gap:4px; padding: 6px 6px 0; }
  .tab {
    flex:1; padding: 8px 4px; cursor:pointer; text-align:center;
    font-size: 12px; font-weight:bold; letter-spacing:.5px;
    background: linear-gradient(180deg,#3c2b16,#2a1d10);
    border: 2px solid var(--bevel-lo); border-bottom:none;
    border-radius: 4px 4px 0 0; color: var(--ink-dim);
  }
  .tab.active { background: linear-gradient(180deg,#6b4f2c,#4a3620); color: var(--gold); }
  .tab-body { padding: 8px; max-height: 520px; overflow-y:auto; }

  .buy {
    display:flex; align-items:center; gap:10px;
    width:100%; text-align:left; cursor:pointer;
    background: linear-gradient(180deg,#5a4225,#3c2b16);
    border: 2px solid var(--bevel-lo);
    box-shadow: inset 1px 1px 0 var(--bevel-hi), inset -1px -1px 0 var(--bevel-lo);
    color: var(--ink); border-radius: 3px;
    padding: 9px 10px; margin: 5px 0; font-family: inherit;
    transition: filter .1s;
  }
  .buy:hover:not(:disabled){ filter: brightness(1.15); }
  .buy:disabled{ opacity:.5; cursor:not-allowed; }
  .buy.owned{ border-color: var(--gold-dim); box-shadow: inset 1px 1px 0 var(--gold), inset -1px -1px 0 var(--bevel-lo); }
  .buy .ico { font-size: 26px; width: 34px; text-align:center; flex:none; }
  .buy .info { flex:1; min-width:0; }
  .buy .b-name { font-weight:bold; font-size: 13px; }
  .buy .b-desc { font-size: 11px; color: var(--ink-dim); }
  .buy .b-cost { font-size: 12px; font-weight:bold; white-space:nowrap; }
  .buy .b-owned { font-size:10px; color: var(--gold); }

  .coin::before { content:"◉"; color: var(--gold); margin-right:3px; }

  footer {
    max-width: 1160px; margin: 0 auto 40px; padding: 0 14px;
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
  }
  .mini-btn {
    background: linear-gradient(180deg,#5a4225,#3c2b16);
    border:2px solid var(--bevel-lo);
    box-shadow: inset 1px 1px 0 var(--bevel-hi), inset -1px -1px 0 var(--bevel-lo);
    color: var(--ink); border-radius:3px; padding: 7px 16px; cursor:pointer;
    font-family:inherit; font-size:12px;
  }
  .mini-btn:hover{ filter: brightness(1.15); }
  .mini-btn.danger{ color:#ff8a6a; }

  #toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--wood-dark); border:2px solid var(--gold-dim);
    box-shadow: 0 4px 14px rgba(0,0,0,.6);
    padding: 10px 18px; border-radius: 4px; color: var(--ink);
    font-size: 13px; opacity:0; pointer-events:none; transition: opacity .25s, transform .25s;
    z-index: 50; max-width: 90vw; text-align:center;
  }
  #toast.show{ opacity:1; transform: translateX(-50%) translateY(-6px); }

  @media (max-width: 920px) {
    .layout { grid-template-columns: 1fr; }
    .area-list { display:grid; grid-template-columns: 1fr 1fr; gap:0 8px; }
    .col-title.areas-title{ grid-column: 1/-1; }
  }
</style>
</head>
<body>

<header>
  <h1 class="gold-text">Gielinor Clicker
    <small>An idle adventure across the realm</small>
  </h1>
  <div class="stats-bar">
    <div class="stat panel">
      <div class="label">Gold</div>
      <div class="value gold-text" id="stat-gold">0</div>
    </div>
    <div class="stat panel">
      <div class="label">Per Click</div>
      <div class="value shadow-text" id="stat-click">1</div>
    </div>
    <div class="stat panel">
      <div class="label">Damage / sec</div>
      <div class="value shadow-text" id="stat-dps">0</div>
    </div>
    <div class="stat panel">
      <div class="label">Kills</div>
      <div class="value shadow-text" id="stat-kills">0</div>
    </div>
  </div>
</header>

<div class="layout">
  <!-- ---------- AREAS ---------- -->
  <div class="panel">
    <div class="col-title areas-title">Adventure Log</div>
    <div class="area-list" id="area-list"></div>
  </div>

  <!-- ---------- COMBAT ---------- -->
  <div class="panel combat" id="combat">
    <div class="wave-row">
      <span id="wave-label">Wave 1 / 10</span>
      <span id="boss-flag" class="boss-flag" style="visibility:hidden">⚔ BOSS ⚔</span>
    </div>
    <div class="monster-name shadow-text" id="mon-name">Chicken</div>
    <div class="monster-sub" id="mon-sub">Lumbridge · Tier I</div>

    <div class="monster-stage" id="stage">
      <div class="monster" id="monster" role="button" aria-label="Attack the monster">🐔</div>
    </div>

    <div class="hp-wrap">
      <div class="hp-fill" id="hp-fill"></div>
      <div class="hp-text" id="hp-text">10 / 10</div>
    </div>

    <div class="dps-note" id="dps-note"></div>
    <div class="click-hint">Click the monster to attack!</div>
  </div>

  <!-- ---------- SHOP ---------- -->
  <div class="panel shop">
    <div class="tabs">
      <div class="tab active" data-tab="weapons">Weapons</div>
      <div class="tab" data-tab="strength">Strength</div>
      <div class="tab" data-tab="familiars">Familiars</div>
      <div class="tab" data-tab="perks">Perks</div>
    </div>
    <div class="tab-body" id="shop-body"></div>
  </div>
</div>

<footer>
  <button class="mini-btn" id="save-btn">💾 Save</button>
  <button class="mini-btn danger" id="reset-btn">🗑 Reset progress</button>
  <span class="mini-btn" style="cursor:default" id="autosave-note">Autosaves every 15s</span>
</footer>

<div id="toast"></div>

<script>
"use strict";

/* =========================================================
   GAME DATA
   ========================================================= */

// Weapons: one-time tiered purchases that set base click damage.
const WEAPONS = [
  { name:"Fists",             ico:"👊", dmg:1,     cost:0 },
  { name:"Bronze Scimitar",   ico:"🗡️", dmg:3,     cost:50 },
  { name:"Iron Scimitar",     ico:"🗡️", dmg:8,     cost:220 },
  { name:"Steel Scimitar",    ico:"🗡️", dmg:20,    cost:900 },
  { name:"Black Scimitar",    ico:"🗡️", dmg:45,    cost:3200 },
  { name:"Mithril Scimitar",  ico:"⚔️", dmg:110,   cost:11000 },
  { name:"Adamant Scimitar",  ico:"⚔️", dmg:260,   cost:38000 },
  { name:"Rune Scimitar",     ico:"⚔️", dmg:600,   cost:130000 },
  { name:"Dragon Scimitar",   ico:"🐲", dmg:1500,  cost:480000 },
  { name:"Abyssal Whip",      ico:"🪢", dmg:4000,  cost:1800000 },
  { name:"Dragon Claws",      ico:"🐾", dmg:11000, cost:7000000 },
  { name:"Armadyl Godsword",  ico:"🌟", dmg:32000, cost:28000000 },
];

// Summoning familiars: repeatable auto-damage (DPS). Buy many of each.
const FAMILIARS = [
  { key:"wolf",   name:"Spirit Wolf",      ico:"🐺", dps:1,     base:60 },
  { key:"spider", name:"Spirit Spider",    ico:"🕷️", dps:6,     base:450 },
  { key:"bird",   name:"Spirit Terrorbird",ico:"🦤", dps:35,    base:3000 },
  { key:"tort",   name:"War Tortoise",     ico:"🐢", dps:180,   base:20000 },
  { key:"bunyip", name:"Bunyip",           ico:"🐡", dps:900,   base:130000 },
  { key:"yak",    name:"Pack Yak",         ico:"🐂", dps:4500,  base:900000 },
  { key:"titan",  name:"Steel Titan",      ico:"🗿", dps:22000, base:6000000 },
];

// Perks: repeatable multipliers.
const PERKS = [
  { key:"strMult",  name:"Prayer: Ultimate Strength", ico:"🙏",
    desc:"+8% click damage per level", base:200,  growth:1.6, effect:0.08 },
  { key:"wealth",   name:"Ring of Wealth",            ico:"💍",
    desc:"+12% gold from all sources",  base:350,  growth:1.7, effect:0.12 },
  { key:"famMult",  name:"Summoning Mastery",         ico:"📖",
    desc:"+10% familiar damage per level", base:500, growth:1.7, effect:0.10 },
];

// Areas = repeatable levels. Each has monsters + a boss every 10th wave.
// hpMul / goldMul set the area's difficulty & reward scale.
const AREAS = [
  { name:"Lumbridge", hpMul:1, goldMul:1,
    monsters:[["Chicken","🐔"],["Cow","🐄"],["Goblin","👺"],["Giant Rat","🐀"]],
    boss:["Evil Chicken","🐓"] },
  { name:"Varrock Sewers", hpMul:6, goldMul:3,
    monsters:[["Zombie","🧟"],["Giant Spider","🕷️"],["Skeleton","💀"],["Giant Rat","🐀"]],
    boss:["Moss Giant","🌿"] },
  { name:"Al Kharid Desert", hpMul:32, goldMul:9,
    monsters:[["Scorpion","🦂"],["Giant Bat","🦇"],["Desert Warrior","🗡️"],["Vulture","🦅"]],
    boss:["Kalphite Queen","👑"] },
  { name:"Taverley Dungeon", hpMul:170, goldMul:26,
    monsters:[["Hill Giant","🗿"],["Hellhound","🐕"],["Blue Dragon","🐉"],["Chaos Druid","🧙"]],
    boss:["Chaos Elemental","🌀"] },
  { name:"Karamja Volcano", hpMul:900, goldMul:75,
    monsters:[["Lesser Demon","😈"],["Fire Giant","🔥"],["Greater Demon","👹"],["Lava Beast","🌋"]],
    boss:["TzTok-Jad","🟠"] },
  { name:"God Wars Dungeon", hpMul:5000, goldMul:220,
    monsters:[["Spiritual Warrior","👤"],["Aviansie","🦅"],["Ork","🐗"],["Goblin Guard","🛡️"]],
    boss:["General Graardor","🐗"] },
  { name:"Morytania Swamp", hpMul:28000, goldMul:640,
    monsters:[["Vampyre","🧛"],["Snakeling","🐍"],["Ghoul","🧟"],["Werewolf","🐺"]],
    boss:["Zulrah","🐍"] },
  { name:"Ungael Ruins", hpMul:160000, goldMul:1900,
    monsters:[["Undead Dragon","🐲"],["Skeletal Wyvern","🦴"],["Ice Troll","🧊"],["Wight","☠️"]],
    boss:["Vorkath","🐲"] },
  { name:"KBD Lair", hpMul:900000, goldMul:5600,
    monsters:[["Baby Dragon","🐉"],["Black Demon","👿"],["Poison Spider","🕸️"],["Bone Guardian","🦴"]],
    boss:["King Black Dragon","🐲"] },
];

const WAVES_PER_AREA = 10; // 10th wave is the boss

/* =========================================================
   STATE
   ========================================================= */
const SAVE_KEY = "gielinorClickerSave_v1";

function freshState() {
  return {
    gold: 0,
    totalKills: 0,
    weaponTier: 0,
    strengthLevel: 0,                 // flat +click from the Strength tab
    familiars: {},                    // key -> count
    perks: { strMult:0, wealth:0, famMult:0 },
    currentArea: 0,
    areaTier: {},                     // areaIndex -> times boss cleared
    unlocked: { 0: true },            // areaIndex -> true
    wave: 1,                          // 1..10 within current area
  };
}

let state = freshState();
let mon = null;         // { name, ico, maxHp, hp, isBoss }
let shopTab = "weapons";

/* =========================================================
   PERSISTENCE
   ========================================================= */
function save(silent) {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    if (!silent) toast("Game saved.");
  } catch (e) {
    if (!silent) toast("Couldn't save (storage blocked in this preview).");
  }
}
function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    state = Object.assign(freshState(), s);
    state.perks = Object.assign({ strMult:0, wealth:0, famMult:0 }, s.perks || {});
    state.familiars = s.familiars || {};
    state.areaTier = s.areaTier || {};
    state.unlocked = s.unlocked || { 0:true };
    return true;
  } catch (e) { return false; }
}

/* =========================================================
   DERIVED VALUES
   ========================================================= */
function tierOf(i)      { return state.areaTier[i] || 0; }
function goldMult()     { return 1 + state.perks.wealth * PERKS[1].effect; }
function famMult()      { return 1 + state.perks.famMult * PERKS[2].effect; }
function strMult()      { return 1 + state.perks.strMult * PERKS[0].effect; }

function clickDamage() {
  const wep = WEAPONS[state.weaponTier].dmg;
  const flat = state.strengthLevel * 2;
  return Math.max(1, Math.floor((wep + flat) * strMult()));
}
function dps() {
  let total = 0;
  for (const f of FAMILIARS) total += (state.familiars[f.key] || 0) * f.dps;
  return Math.floor(total * famMult());
}
function strengthCost() {
  return Math.floor(15 * Math.pow(1.14, state.strengthLevel));
}
function familiarCost(f) {
  const owned = state.familiars[f.key] || 0;
  return Math.floor(f.base * Math.pow(1.15, owned));
}
function perkCost(p) {
  const lvl = state.perks[p.key];
  return Math.floor(p.base * Math.pow(p.growth, lvl));
}

// scaling for the monster on a given wave of the current area
function monsterHpFor(area, wave, isBoss) {
  const a = AREAS[area];
  const t = tierOf(area);
  const waveScale = 1 + 0.18 * (wave - 1);
  const tierScale = Math.pow(1.9, t);        // each clear makes the level meatier
  let hp = 10 * a.hpMul * waveScale * tierScale;
  if (isBoss) hp *= 12;
  return Math.max(10, Math.floor(hp));
}
function monsterGoldFor(area, wave, isBoss) {
  const a = AREAS[area];
  const t = tierOf(area);
  const tierScale = Math.pow(1.75, t);
  let g = 5 * a.goldMul * (1 + 0.12 * (wave - 1)) * tierScale;
  if (isBoss) g *= 15;
  return Math.max(1, Math.floor(g * goldMult()));
}

/* =========================================================
   COMBAT
   ========================================================= */
function spawnMonster() {
  const area = state.currentArea;
  const wave = state.wave;
  const isBoss = wave >= WAVES_PER_AREA;
  const a = AREAS[area];
  let name, ico;
  if (isBoss) {
    [name, ico] = a.boss;
  } else {
    const pick = a.monsters[(wave - 1) % a.monsters.length];
    [name, ico] = pick;
  }
  const maxHp = monsterHpFor(area, wave, isBoss);
  mon = { name, ico, maxHp, hp: maxHp, isBoss,
          gold: monsterGoldFor(area, wave, isBoss) };
  renderMonster();
}

let deadLock = false;
function damageMonster(amount, opts) {
  if (!mon || deadLock) return;
  opts = opts || {};
  mon.hp -= amount;
  showHitsplat(amount, opts);
  const el = document.getElementById("monster");
  el.classList.remove("hurt"); void el.offsetWidth; el.classList.add("hurt");
  if (mon.hp <= 0) killMonster();
  else updateHp();
}

function killMonster() {
  deadLock = true;
  const reward = mon.gold;
  state.gold += reward;
  state.totalKills += 1;

  const el = document.getElementById("monster");
  el.classList.add("dying");
  showGoldDrop(reward);

  const wasBoss = mon.isBoss;
  const area = state.currentArea;

  setTimeout(() => {
    el.classList.remove("dying");
    if (wasBoss) {
      // clear the level: bump tier, unlock next area, reset waves
      state.areaTier[area] = tierOf(area) + 1;
      if (area + 1 < AREAS.length && !state.unlocked[area + 1]) {
        state.unlocked[area + 1] = true;
        toast("🗺️ New area unlocked: " + AREAS[area + 1].name + "!");
      } else {
        toast("🏆 " + AREAS[area].boss[0] + " defeated! Tier " +
              toRoman(tierOf(area)) + " cleared.");
      }
      state.wave = 1;
      renderAreas();
    } else {
      state.wave += 1;
    }
    deadLock = false;
    spawnMonster();
    save(true);
    refreshStats();
  }, 340);

  refreshStats();
}

/* click + crit handling */
function onMonsterClick(ev) {
  if (deadLock) return;
  const crit = Math.random() < 0.10;              // 10% chance for a big hit
  let dmg = clickDamage();
  if (crit) dmg = Math.floor(dmg * 3);
  damageMonster(dmg, { crit, x: ev.offsetX, y: ev.offsetY });
}

/* DPS tick from familiars, applied 10x/sec */
function dpsTick() {
  if (deadLock || !mon) return;
  const perTick = dps() / 10;
  if (perTick <= 0) return;
  mon.hp -= perTick;
  if (mon.hp <= 0) killMonster();
  else updateHp();
}

/* =========================================================
   RENDER — combat
   ========================================================= */
function renderMonster() {
  const el = document.getElementById("monster");
  el.textContent = mon.ico;
  el.classList.toggle("boss", mon.isBoss);
  document.getElementById("mon-name").textContent = mon.name;
  document.getElementById("mon-sub").textContent =
    AREAS[state.currentArea].name + " · Tier " + toRoman(tierOf(state.currentArea) + 1);
  document.getElementById("wave-label").textContent =
    mon.isBoss ? "Boss Wave" : ("Wave " + state.wave + " / " + WAVES_PER_AREA);
  document.getElementById("boss-flag").style.visibility = mon.isBoss ? "visible" : "hidden";
  updateHp();
}
function updateHp() {
  const pct = Math.max(0, mon.hp / mon.maxHp) * 100;
  const fill = document.getElementById("hp-fill");
  fill.style.width = pct + "%";
  // green -> red as it drops
  const g = Math.round(0.6 + pct/100 * 0.6 * 255);
  fill.style.background =
    "linear-gradient(180deg," +
    (pct > 50 ? "#58c758,#3fa63f" : pct > 22 ? "#c7a53f,#a67f14" : "#c75050,#a41414") + ")";
  document.getElementById("hp-text").textContent =
    fmt(Math.max(0, Math.ceil(mon.hp))) + " / " + fmt(mon.maxHp);
}

function showHitsplat(amount, opts) {
  const stage = document.getElementById("stage");
  const s = document.createElement("div");
  s.className = "hitsplat" + (opts.crit ? " crit" : "") + (amount <= 0 ? " zero" : "");
  s.textContent = fmt(Math.round(amount));
  const rect = stage.getBoundingClientRect();
  const cx = (opts.x != null ? (rect.width/2 - 80 + opts.x*0.5) : rect.width/2)
             + (Math.random()*60 - 30);
  const cy = rect.height/2 + (Math.random()*40 - 20);
  s.style.left = cx + "px";
  s.style.top  = cy + "px";
  stage.appendChild(s);
  setTimeout(() => s.remove(), 800);
}
function showGoldDrop(amount) {
  const stage = document.getElementById("stage");
  const d = document.createElement("div");
  d.className = "gold-drop";
  d.textContent = "+" + fmt(amount) + " gp";
  d.style.left = "50%";
  d.style.top  = "40%";
  stage.appendChild(d);
  setTimeout(() => d.remove(), 1100);
}

/* =========================================================
   RENDER — areas
   ========================================================= */
function renderAreas() {
  const list = document.getElementById("area-list");
  list.innerHTML = "";
  AREAS.forEach((a, i) => {
    const unlocked = !!state.unlocked[i];
    const btn = document.createElement("button");
    btn.className = "area-btn" + (i === state.currentArea ? " active" : "");
    btn.disabled = !unlocked;
    const tier = tierOf(i);
    btn.innerHTML =
      '<span class="a-name">' + (unlocked ? a.name : "🔒 ???") +
        (unlocked && tier > 0 ? '<span class="a-tier">'+toRoman(tier+1)+'</span>' : '') +
      '</span>' +
      '<span class="a-sub">' +
        (unlocked
          ? (tier > 0 ? "Cleared ×" + tier + " · Boss: " + a.boss[0] : "Boss: " + a.boss[0])
          : "Defeat the previous boss") +
      '</span>';
    if (unlocked) btn.onclick = () => selectArea(i);
    list.appendChild(btn);
  });
}
function selectArea(i) {
  if (!state.unlocked[i]) return;
  state.currentArea = i;
  state.wave = 1;
  deadLock = false;
  renderAreas();
  spawnMonster();
  save(true);
}

/* =========================================================
   RENDER — shop
   ========================================================= */
function renderShop() {
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.dataset.tab === shopTab));
  const body = document.getElementById("shop-body");
  body.innerHTML = "";

  if (shopTab === "weapons") {
    WEAPONS.forEach((w, i) => {
      if (i === 0) return; // fists are the default, nothing to buy
      const owned = state.weaponTier >= i;
      const isNext = state.weaponTier === i - 1;
      const b = mkBuy({
        ico: w.ico, name: w.name,
        desc: "Click damage → " + fmt(w.dmg),
        cost: owned ? null : w.cost,
        owned,
        disabled: !owned && (!isNext || state.gold < w.cost),
        tag: owned ? "Equipped" : (isNext ? null : "Locked"),
      });
      if (!owned && isNext) b.onclick = () => {
        if (state.gold < w.cost) return;
        state.gold -= w.cost; state.weaponTier = i;
        toast("Equipped " + w.name + "!"); afterBuy();
      };
      body.appendChild(b);
    });
  }

  if (shopTab === "strength") {
    const cost = strengthCost();
    const b = mkBuy({
      ico:"💪", name:"Train Strength",
      desc:"+2 base click damage  (Lv " + state.strengthLevel + ")",
      cost, disabled: state.gold < cost,
    });
    b.onclick = () => { const c = strengthCost(); if (state.gold < c) return;
      state.gold -= c; state.strengthLevel++; afterBuy(); };
    body.appendChild(b);

    const note = document.createElement("div");
    note.className = "b-desc";
    note.style.cssText = "padding:8px 4px;color:var(--ink-dim);font-size:12px;line-height:1.5";
    note.innerHTML = "Each level adds flat click damage, then scales with your "
      + "Prayer bonus. Cheap early, and it never stops helping.";
    body.appendChild(note);
  }

  if (shopTab === "familiars") {
    FAMILIARS.forEach(f => {
      const owned = state.familiars[f.key] || 0;
      const cost = familiarCost(f);
      const b = mkBuy({
        ico: f.ico, name: f.name,
        desc: "+" + fmt(f.dps) + " damage/sec each",
        cost, ownedCount: owned,
        disabled: state.gold < cost,
      });
      b.onclick = () => { const c = familiarCost(f); if (state.gold < c) return;
        state.gold -= c; state.familiars[f.key] = (state.familiars[f.key]||0)+1; afterBuy(); };
      body.appendChild(b);
    });
  }

  if (shopTab === "perks") {
    PERKS.forEach(p => {
      const lvl = state.perks[p.key];
      const cost = perkCost(p);
      const b = mkBuy({
        ico: p.ico, name: p.name,
        desc: p.desc + "  (Lv " + lvl + ")",
        cost, disabled: state.gold < cost,
      });
      b.onclick = () => { const c = perkCost(p); if (state.gold < c) return;
        state.gold -= c; state.perks[p.key]++; afterBuy(); };
      body.appendChild(b);
    });
  }
}

function mkBuy(o) {
  const b = document.createElement("button");
  b.className = "buy" + (o.owned ? " owned" : "");
  if (o.disabled) b.disabled = true;
  let right;
  if (o.cost == null) right = '<span class="b-owned">' + (o.tag || "Owned") + '</span>';
  else right = '<span class="b-cost coin">' + fmt(o.cost) + '</span>';
  b.innerHTML =
    '<span class="ico">' + o.ico + '</span>' +
    '<span class="info">' +
      '<span class="b-name">' + o.name +
        (o.ownedCount ? ' <span class="b-owned">×'+o.ownedCount+'</span>' : '') +
        (o.tag && o.cost != null ? ' <span class="b-owned">'+o.tag+'</span>' : '') +
      '</span>' +
      '<span class="b-desc">' + o.desc + '</span>' +
    '</span>' + right;
  return b;
}
function afterBuy() { refreshStats(); renderShop(); save(true); }

/* =========================================================
   STATS + HELPERS
   ========================================================= */
function refreshStats() {
  document.getElementById("stat-gold").textContent  = fmt(Math.floor(state.gold));
  document.getElementById("stat-click").textContent = fmt(clickDamage());
  document.getElementById("stat-dps").textContent   = fmt(dps());
  document.getElementById("stat-kills").textContent = fmt(state.totalKills);
  const d = dps();
  document.getElementById("dps-note").textContent =
    d > 0 ? ("Your familiars deal " + fmt(d) + " damage/sec automatically.")
          : "Buy a Summoning familiar to deal damage automatically.";
}

function fmt(n) {
  n = Math.round(n);
  if (n < 1000) return "" + n;
  const units = ["","K","M","B","T","Qa","Qi","Sx"];
  let u = 0;
  while (n >= 1000 && u < units.length - 1) { n /= 1000; u++; }
  return (n < 10 ? n.toFixed(2) : n < 100 ? n.toFixed(1) : Math.floor(n)) + units[u];
}
function toRoman(num) {
  if (num <= 0) return "0";
  const map = [[1000,"M"],[900,"CM"],[500,"D"],[400,"CD"],[100,"C"],[90,"XC"],
    [50,"L"],[40,"XL"],[10,"X"],[9,"IX"],[5,"V"],[4,"IV"],[1,"I"]];
  let r = "";
  for (const [v,s] of map) while (num >= v) { r += s; num -= v; }
  return r;
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

/* =========================================================
   WIRING + LOOP
   ========================================================= */
function init() {
  const loaded = load();

  document.getElementById("monster").addEventListener("click", onMonsterClick);
  document.querySelectorAll(".tab").forEach(t =>
    t.addEventListener("click", () => { shopTab = t.dataset.tab; renderShop(); }));

  document.getElementById("save-btn").onclick = () => save(false);
  document.getElementById("reset-btn").onclick = () => {
    if (confirm("Reset all progress? This cannot be undone.")) {
      state = freshState();
      try { localStorage.removeItem(SAVE_KEY); } catch(e){}
      deadLock = false;
      renderAreas(); renderShop(); spawnMonster(); refreshStats();
      toast("Progress reset. Welcome back to Lumbridge!");
    }
  };

  // make sure current area is valid/unlocked
  if (!state.unlocked[state.currentArea]) state.currentArea = 0;

  renderAreas();
  renderShop();
  spawnMonster();
  refreshStats();

  setInterval(dpsTick, 100);       // familiars attack 10x/sec
  setInterval(() => save(true), 15000);
  window.addEventListener("beforeunload", () => save(true));

  if (!loaded) toast("Welcome to Gielinor! Click the chicken to begin.");
}

document.addEventListener("DOMContentLoaded", init);
</script>
