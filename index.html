<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Gielinor Clicker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Ccircle%20cx='32'%20cy='32'%20r='28'%20fill='%23ffcc22'%20stroke='%23b8901f'%20stroke-width='4'/%3E%3Ccircle%20cx='32'%20cy='32'%20r='21'%20fill='none'%20stroke='%23b8901f'%20stroke-width='2'/%3E%3Cpolygon%20points='32,15%2036,37%2028,37'%20fill='%23b8901f'/%3E%3Crect%20x='27'%20y='35'%20width='10'%20height='6'%20rx='1'%20fill='%23b8901f'/%3E%3Crect%20x='30'%20y='40'%20width='4'%20height='10'%20rx='1'%20fill='%23b8901f'/%3E%3C/svg%3E" />
<style>
  :root {
    --bg:        #120d08;
    --wood-dark: #2a1d10;
    --wood:      #4a3620;
    --wood-lite: #6b4f2c;
    --bevel-hi:  #8a6a3d;
    --bevel-lo:  #170f07;
    --parch:     #d8b878;
    --gold:      #ffcc22;
    --gold-dim:  #b8901f;
    --ink:       #f2e2bd;
    --ink-dim:   #b7a077;
    --hp-good:   #3fa63f;
    --hp-bad:    #a41414;
    --hit:       #9c0d05;
    --locked:    #3a2c1a;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at 50% -10%, #241708 0%, var(--bg) 60%);
    color: var(--ink);
    font-family: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
    -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
  }
  /* Kill double-tap / pinch zoom inside the game (esp. on mobile) */
  html { touch-action: manipulation; }
  button, .tab, .monster, .area-btn, .buy, .mini-btn { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .panel {
    background: linear-gradient(180deg, var(--wood-lite), var(--wood) 40%, var(--wood-dark));
    border: 2px solid var(--bevel-lo);
    box-shadow: inset 2px 2px 0 var(--bevel-hi), inset -2px -2px 0 var(--bevel-lo), 0 6px 16px rgba(0,0,0,.55);
    border-radius: 4px;
  }
  .gold-text { color: var(--gold); text-shadow: 1px 1px 0 #000, 2px 2px 0 rgba(0,0,0,.4); }
  .shadow-text { text-shadow: 1px 1px 0 #000; }

  .ic-svg { display: block; width: 100%; height: 100%; }

  header {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 12px 18px; margin: 14px auto 10px; max-width: 1160px; flex-wrap: wrap;
  }
  header h1 { margin: 0; font-size: clamp(20px, 3.4vw, 30px); letter-spacing: .5px; }
  header h1 small {
    display: block; font-size: 11px; letter-spacing: 2px; color: var(--ink-dim);
    text-transform: uppercase; text-shadow: none; font-weight: normal; margin-top: 2px;
  }
  .stats-bar { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat { padding: 8px 14px; text-align: center; min-width: 92px; }
  .stat .label { font-size: 10px; letter-spacing: 1px; color: var(--ink-dim); text-transform: uppercase; }
  .stat .value { font-size: 18px; font-weight: bold; }

  .layout {
    display: grid; grid-template-columns: 210px 1fr 330px; gap: 14px;
    max-width: 1160px; margin: 0 auto 40px; padding: 0 14px; align-items: start;
  }
  .col-title {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-dim);
    padding: 10px 12px 6px; text-shadow: 1px 1px 0 #000;
  }

  /* ---------- AREAS ---------- */
  .area-list { padding: 6px; }
  .area-btn {
    display: block; width: 100%; text-align: left;
    background: linear-gradient(180deg,#5a4225,#3c2b16);
    border: 2px solid var(--bevel-lo);
    box-shadow: inset 1px 1px 0 var(--bevel-hi), inset -1px -1px 0 var(--bevel-lo);
    color: var(--ink); border-radius: 3px; padding: 8px 10px; margin: 4px 0;
    cursor: pointer; font-family: inherit; font-size: 13px; transition: filter .12s;
  }
  .area-btn:hover:not(:disabled) { filter: brightness(1.18); }
  .area-btn.active {
    background: linear-gradient(180deg,#7a5a2e,#5a4020);
    box-shadow: inset 1px 1px 0 var(--gold), inset -1px -1px 0 var(--bevel-lo), 0 0 8px rgba(255,204,34,.35);
  }
  .area-btn:disabled { cursor: not-allowed; color: #8a7657; background: var(--locked); box-shadow: inset 1px 1px 0 #4a3a22; }
  .area-btn .a-name { font-weight: bold; display:flex; justify-content: space-between; align-items:center; gap:6px; }
  .area-btn .a-name .lock { width:14px; height:14px; flex:none; opacity:.8; }
  .area-btn .a-sub { font-size: 10px; color: var(--ink-dim); margin-top: 2px; }
  .area-btn .a-tier { font-size:10px; color: var(--gold); font-weight:bold; }
  .a-diff { display:flex; gap:3px; margin-top:5px; align-items:center; }
  .a-diff .lbl { font-size:9px; letter-spacing:1px; color:var(--ink-dim); margin-right:2px; }
  .pip { width:8px; height:8px; transform:rotate(45deg); background:var(--bevel-lo); border:1px solid #0006; }
  .pip.on { background:linear-gradient(135deg,#ff6a3d,#c22); box-shadow:0 0 3px rgba(255,90,60,.6); border-color:#0006; }

  /* ---------- COMBAT ---------- */
  .combat { padding: 16px; position: relative; overflow: hidden; min-height: 470px; }
  .wave-row { display: flex; justify-content: space-between; align-items:center; font-size: 12px; color: var(--ink-dim); letter-spacing:1px; margin-bottom: 8px; }
  .boss-flag { color: #ff6a3d; font-weight: bold; text-shadow: 1px 1px 0 #000; }
  .monster-name { text-align:center; font-size: 22px; font-weight: bold; margin: 4px 0 2px; }
  .monster-sub  { text-align:center; font-size: 12px; color: var(--ink-dim); margin-bottom: 6px; }
  .monster-stage { position: relative; display: flex; align-items: center; justify-content: center; height: 220px; margin: 0 auto 12px; user-select: none; }
  .monster {
    width: 168px; height: 168px; cursor: pointer;
    filter: drop-shadow(0 12px 10px rgba(0,0,0,.6)); transition: transform .05s;
  }
  .monster:active { transform: scale(.92); }
  .monster.boss { width: 196px; height: 196px; filter: drop-shadow(0 0 14px rgba(255,80,40,.55)) drop-shadow(0 10px 10px rgba(0,0,0,.6)); }
  .monster.hurt { animation: shake .18s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 50%{transform:translateX(6px)} 75%{transform:translateX(-4px)} }
  .monster.dying { animation: die .35s forwards; }
  @keyframes die { to { transform: scale(.2) rotate(20deg); opacity: 0; } }

  .hitsplat {
    position: absolute; min-width: 34px; height: 34px; padding: 0 6px;
    display:flex; align-items:center; justify-content:center;
    background: var(--hit); color: #fff; font-weight: bold; font-size: 15px;
    border-radius: 50%; box-shadow: 0 0 0 2px #000 inset, 0 2px 4px rgba(0,0,0,.5);
    pointer-events: none; text-shadow: 1px 1px 0 #000; animation: splat .8s ease-out forwards; z-index: 5;
  }
  .hitsplat.crit { background:#d38900; font-size:18px; min-width:40px; height:40px; }
  .hitsplat.zero { background:#0d5b9c; }
  .hitsplat.insta { background:#7a0f1c; color:#fff; font-size:15px; min-width:46px; height:38px; box-shadow:0 0 10px #ff3b3b88; }
  @keyframes splat {
    0%{ transform: translate(-50%,-50%) scale(.4); opacity: 0; }
    18%{ transform: translate(-50%,-60%) scale(1.15); opacity: 1; }
    100%{ transform: translate(-50%,-150%) scale(.9); opacity: 0; }
  }
  .gold-drop {
    position:absolute; pointer-events:none; z-index:6; color: var(--gold);
    font-weight:bold; font-size: 16px; text-shadow: 1px 1px 0 #000, 0 0 6px rgba(255,204,34,.6);
    animation: floatup 1.1s ease-out forwards;
  }
  @keyframes floatup { 0%{ transform: translate(-50%,0); opacity:0; } 15%{ opacity:1; } 100%{ transform: translate(-50%,-70px); opacity:0; } }

  .hp-wrap { height: 26px; border: 2px solid var(--bevel-lo); border-radius: 3px; background: #200; position: relative; overflow:hidden; box-shadow: inset 1px 1px 0 var(--bevel-hi); margin: 0 auto; max-width: 460px; }
  .hp-fill { height: 100%; background: linear-gradient(180deg, #58c758, var(--hp-good)); width: 100%; transition: width .08s linear; }
  .hp-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size: 13px; font-weight: bold; color:#fff; text-shadow: 1px 1px 0 #000; }
  .dps-note { text-align:center; font-size: 12px; color: var(--ink-dim); margin-top: 12px; }
  .click-hint { text-align:center; font-size: 11px; color: var(--gold-dim); margin-top: 4px; letter-spacing:1px; }

  /* ---------- SHOP ---------- */
  .shop { padding: 8px; }
  .tabs { display:flex; gap:4px; padding: 6px 6px 0; }
  .tab {
    flex:1; padding: 8px 4px; cursor:pointer; text-align:center; font-size: 12px; font-weight:bold; letter-spacing:.3px;
    background: linear-gradient(180deg,#3c2b16,#2a1d10); border: 2px solid var(--bevel-lo); border-bottom:none;
    border-radius: 4px 4px 0 0; color: var(--ink-dim);
  }
  .tab.active { background: linear-gradient(180deg,#6b4f2c,#4a3620); color: var(--gold); }
  .tab-body { padding: 8px; max-height: calc(100vh - 140px); overflow-y:auto; }

  /* buy-amount toggle (familiars) */
  .qty-row { display:flex; gap:5px; padding: 4px 4px 8px; }
  .qty-btn {
    flex:1; padding:6px 4px; cursor:pointer; text-align:center; font-size:12px; font-weight:bold;
    background: linear-gradient(180deg,#3c2b16,#2a1d10); border:2px solid var(--bevel-lo);
    color: var(--ink-dim); border-radius:3px; font-family:inherit;
  }
  .qty-btn.active { background: linear-gradient(180deg,#6b4f2c,#4a3620); color: var(--gold); box-shadow: inset 1px 1px 0 var(--gold); }

  .buy {
    display:flex; align-items:center; gap:10px; width:100%; text-align:left; cursor:pointer;
    background: linear-gradient(180deg,#5a4225,#3c2b16); border: 2px solid var(--bevel-lo);
    box-shadow: inset 1px 1px 0 var(--bevel-hi), inset -1px -1px 0 var(--bevel-lo);
    color: var(--ink); border-radius: 3px; padding: 9px 10px; margin: 5px 0; font-family: inherit; transition: filter .1s;
  }
  .buy:hover:not(:disabled){ filter: brightness(1.15); }
  .buy:disabled{ opacity:.55; cursor:not-allowed; }
  .buy.owned{ border-color: var(--gold-dim); box-shadow: inset 1px 1px 0 var(--gold), inset -1px -1px 0 var(--bevel-lo); }
  .buy .ico { width: 36px; height: 36px; flex:none; }
  .buy .info { flex:1; min-width:0; }
  /* THE FORMATTING FIX: name and each description line each sit on their own line */
  .buy .b-name { display:block; font-weight:bold; font-size: 13px; margin-bottom:1px; }
  .buy .b-line { display:block; font-size: 11px; color: var(--ink-dim); line-height:1.35; }
  .buy .b-line.boost { color: var(--gold); }
  .buy .b-cost { display:block; font-size: 12px; font-weight:bold; white-space:nowrap; text-align:right; }
  .buy .b-owned { font-size:10px; color: var(--gold); }
  .buy .b-tag { font-size:10px; color: var(--gold); font-weight:normal; }
  .coin::before { content:"\25C9"; color: var(--gold); margin-right:3px; }

  footer { max-width: 1160px; margin: 0 auto 40px; padding: 0 14px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .mini-btn {
    background: linear-gradient(180deg,#5a4225,#3c2b16); border:2px solid var(--bevel-lo);
    box-shadow: inset 1px 1px 0 var(--bevel-hi), inset -1px -1px 0 var(--bevel-lo);
    color: var(--ink); border-radius:3px; padding: 7px 16px; cursor:pointer; font-family:inherit; font-size:12px;
  }
  .mini-btn:hover{ filter: brightness(1.15); }
  .mini-btn.danger{ color:#ff8a6a; }
  .reset-top{ align-self:center; font-size:11px; padding:5px 12px; opacity:.75; }
  .reset-top:hover{ opacity:1; }

  #toast {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--wood-dark); border:2px solid var(--gold-dim); box-shadow: 0 4px 14px rgba(0,0,0,.6);
    padding: 10px 18px; border-radius: 4px; color: var(--ink); font-size: 13px;
    opacity:0; pointer-events:none; transition: opacity .25s, transform .25s; z-index: 50; max-width: 90vw; text-align:center;
  }
  #toast.show{ opacity:1; transform: translateX(-50%) translateY(-6px); }

  /* Always-visible gold badge — appears once you scroll away from the header */
  #gold-hud {
    position: fixed; top: 10px; right: 12px; z-index: 46;
    display: flex; align-items: center; gap: 7px;
    padding: 8px 14px; border-radius: 999px;
    font-size: 16px; font-weight: bold;
    opacity: 0; transform: translateY(-14px); pointer-events: none;
    transition: opacity .2s, transform .2s;
  }
  #gold-hud.show { opacity: 1; transform: translateY(0); }
  #gold-hud .coin-dot {
    width: 16px; height: 16px; border-radius: 50%; flex:none;
    background: radial-gradient(circle at 35% 30%, #ffe27a, var(--gold) 55%, var(--gold-dim));
    box-shadow: 0 0 0 1px #000 inset;
  }
  #gold-hud .hud-val { color: var(--gold); text-shadow: 1px 1px 0 #000; }

  @media (max-width: 920px) {
    .layout { grid-template-columns: 1fr; }
    .area-list { display:grid; grid-template-columns: 1fr 1fr; gap:0 8px; }
    .col-title.areas-title{ grid-column: 1/-1; }
  }
</style>
</head>
<body>

<header>
  <h1 class="gold-text">Gielinor Clicker<small>An idle adventure across the realm</small></h1>
  <div class="stats-bar">
    <div class="stat panel"><div class="label">Gold</div><div class="value gold-text" id="stat-gold">0</div></div>
    <div class="stat panel"><div class="label">Per Click</div><div class="value shadow-text" id="stat-click">1</div></div>
    <div class="stat panel"><div class="label">Damage / sec</div><div class="value shadow-text" id="stat-dps">0</div></div>
    <div class="stat panel"><div class="label">Kills</div><div class="value shadow-text" id="stat-kills">0</div></div>
    <button class="mini-btn danger reset-top" id="reset-btn">&#8635; Reset</button>
  </div>
</header>

<div id="gold-hud" class="panel"><span class="coin-dot"></span><span class="hud-val" id="hud-gold">0</span></div>

<div class="layout">
  <div class="panel">
    <div class="col-title areas-title">Adventure Log</div>
    <div class="area-list" id="area-list"></div>
  </div>

  <div class="panel combat" id="combat">
    <div class="wave-row">
      <span id="wave-label">Wave 1 / 10</span>
      <span id="boss-flag" class="boss-flag" style="visibility:hidden">&#9876; BOSS &#9876;</span>
    </div>
    <div class="monster-name shadow-text" id="mon-name">Chicken</div>
    <div class="monster-sub" id="mon-sub">Lumbridge &middot; Tier I</div>
    <div class="monster-stage" id="stage">
      <div class="monster" id="monster" role="button" aria-label="Attack the monster"></div>
    </div>
    <div class="hp-wrap"><div class="hp-fill" id="hp-fill"></div><div class="hp-text" id="hp-text">10 / 10</div></div>
    <div class="dps-note" id="dps-note"></div>
    <div class="click-hint">Click the monster to attack!</div>
  </div>

  <div class="panel shop">
    <div class="tabs">
      <div class="tab active" data-tab="weapons">Weapons</div>
      <div class="tab" data-tab="strength">Strength</div>
      <div class="tab" data-tab="familiars">Familiars</div>
      <div class="tab" data-tab="perks">Perks</div>
    </div>
    <div class="tab-body" id="shop-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
"use strict";

/* =========================================================
   CUSTOM SVG ICONS  (original OSRS-styled art; {c} = primary colour)
   Want real sprites instead? Drop images in an /icons folder and swap
   icon(key,color) below for: '<img src="icons/"+key+".png">'.
   ========================================================= */
const ICON = {
 chicken:`<ellipse cx="35" cy="40" rx="16" ry="13" fill="{c}"/><circle cx="24" cy="27" r="10" fill="{c}"/><path d="M19 17 q2 -7 5 -3 q3 -5 5 1 z" fill="#d23b30"/><polygon points="13,27 5,29 13,32" fill="#e8892a"/><circle cx="21" cy="26" r="1.8" fill="#20140a"/><path d="M49 36 q10 -2 8 10 q-6 -4 -8 -3z" fill="{c}" stroke="#c9bfae" stroke-width="1"/><path d="M28 52 l-3 8 M40 52 l3 8" stroke="#e8892a" stroke-width="3" fill="none"/>`,
 cow:`<ellipse cx="34" cy="40" rx="18" ry="13" fill="{c}"/><ellipse cx="52" cy="30" rx="9" ry="8" fill="{c}"/><path d="M45 24 q-4 -8 2 -9 M59 24 q4 -8 -2 -9" stroke="#efe7d6" stroke-width="3" fill="none"/><ellipse cx="54" cy="34" rx="4" ry="3" fill="#e59aa6"/><circle cx="50" cy="28" r="1.7" fill="#20140a"/><ellipse cx="24" cy="38" rx="7" ry="6" fill="#3a2c1f"/><ellipse cx="40" cy="46" rx="6" ry="5" fill="#3a2c1f"/><path d="M24 52 v8 M34 53 v8 M44 52 v8" stroke="#d9cdb4" stroke-width="3"/>`,
 goblin:`<path d="M22 30 q12 -16 20 0 l-3 20 q-7 6 -14 0z" fill="{c}"/><polygon points="20,28 10,22 22,34" fill="{c}"/><polygon points="44,28 54,22 42,34" fill="{c}"/><ellipse cx="27" cy="30" rx="3" ry="4" fill="#ffe36b"/><ellipse cx="37" cy="30" rx="3" ry="4" fill="#ffe36b"/><circle cx="27" cy="31" r="1.5" fill="#20140a"/><circle cx="37" cy="31" r="1.5" fill="#20140a"/><path d="M27 40 q5 4 10 0" stroke="#20140a" stroke-width="2" fill="none"/><rect x="26" y="48" width="12" height="10" rx="2" fill="#7a5a34"/>`,
 rat:`<ellipse cx="34" cy="42" rx="17" ry="11" fill="{c}"/><circle cx="20" cy="34" r="8" fill="{c}"/><circle cx="16" cy="26" r="5" fill="#b8a488"/><circle cx="26" cy="24" r="5" fill="#b8a488"/><circle cx="15" cy="35" r="1.6" fill="#20140a"/><path d="M12 38 l-6 1 M12 41 l-6 2" stroke="#20140a" stroke-width="1"/><path d="M50 44 q14 2 12 -10" stroke="#caa" stroke-width="3" fill="none"/><polygon points="16,40 19,45 13,45" fill="#efe"/>`,

 zombie:`<path d="M22 26 q10 -12 20 0 l-2 26 q-8 6 -16 0z" fill="{c}"/><circle cx="28" cy="30" r="3.4" fill="#f4f0d8"/><circle cx="28" cy="30" r="1.4" fill="#20140a"/><path d="M36 28 l6 3 l-6 2z" fill="#2c2418"/><path d="M26 40 h12" stroke="#20140a" stroke-width="2"/><path d="M30 42 v3 M34 42 v3" stroke="#20140a" stroke-width="1.4"/><path d="M20 34 l-8 6 M44 34 l8 8" stroke="{c}" stroke-width="5" stroke-linecap="round"/>`,
 spider:`<g stroke="{c}" stroke-width="3.4" fill="none" stroke-linecap="round"><path d="M30 34 l-18 -8 M30 38 l-20 0 M30 42 l-18 10"/><path d="M38 34 l18 -8 M38 38 l20 0 M38 42 l18 10"/></g><ellipse cx="34" cy="40" rx="13" ry="11" fill="{c}"/><circle cx="34" cy="27" r="8" fill="{c}"/><circle cx="31" cy="26" r="2" fill="#e23b30"/><circle cx="37" cy="26" r="2" fill="#e23b30"/><circle cx="34" cy="30" r="1.6" fill="#e23b30"/>`,

const WAVES_PER_AREA = 10;
const TIER_SCALE = 1.5; // applied equally to HP and gold -> efficiency-neutral tiers
// Prestige milestones: 10, then every 25 (25, 50, 75, 100, ...). Each one doubles.
function buildMilestones() { const a = [10]; for (let v = 25; v <= 2000; v += 25) a.push(v); return a; }
const FAM_MILESTONES = buildMilestones();
const STR_MILESTONES = buildMilestones();
function milestoneMult(count, list) { let m = 1; for (const t of list) if (count >= t) m *= 2; return m; }
function nextMilestone(count, list) { for (const t of list) if (count < t) return t; return null; }

/* =========================================================
   STATE
   ========================================================= */
const SAVE_KEY = "gielinorClickerSave_v2";
function freshState() {
  return {
    gold: 0, totalKills: 0, weaponTier: 0,
    strengthLevel: 0, pietyLevel: 0, overloadLevel: 0,
    familiars: {}, perks: { wealth:0, famMult:0, instakill:0, crit:0 },
    currentArea: 0, areaTier: {}, unlocked: { 0: true }, wave: 1,
  };
}
let state = freshState();
let mon = null;
let shopTab = "weapons";
let famBuyQty = 1;   // 1 / 5 / 25  — how many familiars to buy per click

/* =========================================================
   PERSISTENCE
   ========================================================= */
function save(silent) {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); if (!silent) toast("Game saved."); }
  catch (e) { if (!silent) toast("Couldn't save (storage blocked in this preview)."); }
}
function load() {
  try {
    const raw = localStorage.getItem(SAVE_KEY); if (!raw) return false;
    const s = JSON.parse(raw);
    state = Object.assign(freshState(), s);
    state.perks = Object.assign({ wealth:0, famMult:0, instakill:0, crit:0 }, s.perks || {});
    // Piety moved from Perks to the Strength tab — carry old levels (and the even older
    // "Ultimate Strength") into the new Piety upgrade so nothing is lost.
    if (s.perks && s.perks.piety)   state.pietyLevel = (state.pietyLevel || 0) + s.perks.piety;
    if (s.perks && s.perks.strMult) state.pietyLevel = (state.pietyLevel || 0) + s.perks.strMult;
    delete state.perks.piety; delete state.perks.strMult;
    state.familiars = s.familiars || {}; state.areaTier = s.areaTier || {};
    state.unlocked = s.unlocked || { 0:true };
    return true;
  } catch (e) { return false; }
}

/* =========================================================
   DERIVED VALUES
   ========================================================= */
function tierOf(i)  { return state.areaTier[i] || 0; }
function goldMult() { return 1 + state.perks.wealth  * 0.12; }
function famMult()  { return 1 + state.perks.famMult * 0.10; }

// Strength-tab click multipliers (each +X% per level). Train Strength also builds Prestige.
const STR_PCT = 0.08, PIETY_PCT = 0.10, OVER_PCT = 0.12;
// Strength-tab boosts ADD together (they don't compound), then Prestige multiplies the total.
function clickMult()   { return 1 + state.strengthLevel * STR_PCT + state.pietyLevel * PIETY_PCT + state.overloadLevel * OVER_PCT; }
function strBonus()    { return state.strengthLevel * STR_PCT; }
function pietyBonus()  { return state.pietyLevel    * PIETY_PCT; }
function overBonus()   { return state.overloadLevel * OVER_PCT; }
function strPrestige() { return milestoneMult(state.strengthLevel, STR_MILESTONES); }

// Perk proc chances — ~0.5% per level, hard-capped at 10% (slow to max on purpose).
const INSTA_STEP = 0.005, INSTA_CAP = 0.10, INSTA_COOLDOWN = 10000;
const CRIT_STEP  = 0.005, CRIT_CAP  = 0.10, CRIT_MULT = 10;
function instaChance() { return Math.min(INSTA_CAP, state.perks.instakill * INSTA_STEP); }
function critChance()  { return Math.min(CRIT_CAP,  state.perks.crit      * CRIT_STEP); }

function clickDamage() {
  const wep = WEAPONS[state.weaponTier].dmg;
  // weapon x Train Strength% x Piety% x Overloads% x Prestige  (all multiply together)
  return Math.max(1, Math.floor(wep * clickMult() * strPrestige()));
}
function dps() {
  let total = 0;
  for (const f of FAMILIARS) {
    const c = state.familiars[f.key] || 0;
    total += c * f.dps * milestoneMult(c, FAM_MILESTONES);
  }
  return Math.floor(total * famMult());
}
function strengthCost() { return Math.floor(15 * Math.pow(1.14, state.strengthLevel)); }
function pietyCost()    { return Math.floor(500 * Math.pow(1.15, state.pietyLevel)); }
function overloadCost() { return Math.floor(3000 * Math.pow(1.15, state.overloadLevel)); }
function familiarCost(f) { return Math.floor(f.base * Math.pow(1.15, state.familiars[f.key] || 0)); }
// Total cost to buy `n` more of a familiar (prices escalate per unit).
function familiarCostN(f, n) {
  const owned = state.familiars[f.key] || 0; let total = 0;
  for (let k = 0; k < n; k++) total += Math.floor(f.base * Math.pow(1.15, owned + k));
  return total;
}
function perkCost(p) { return Math.floor(p.base * Math.pow(p.growth, state.perks[p.key])); }

function monsterHpFor(area, wave, isBoss) {
  const a = AREAS[area], t = tierOf(area);
  let hp = 10 * a.hpMul * (1 + 0.18 * (wave - 1)) * Math.pow(TIER_SCALE, t);
  if (isBoss) hp *= 12;
  return Math.max(10, Math.floor(hp));
}
function monsterGoldFor(area, wave, isBoss) {
  const a = AREAS[area], t = tierOf(area);
  let g = 5 * a.goldMul * (1 + 0.12 * (wave - 1)) * Math.pow(TIER_SCALE, t);
  if (isBoss) g *= 15;
  return Math.max(1, Math.floor(g * goldMult()));
}
function areaDifficulty(i) { return Math.min(5, Math.round((i / (AREAS.length - 1)) * 4) + 1); }

/* =========================================================
   COMBAT
   ========================================================= */
function spawnMonster() {
  const area = state.currentArea, wave = state.wave, isBoss = wave >= WAVES_PER_AREA;
  const a = AREAS[area];
  const src = isBoss ? a.boss : a.monsters[(wave - 1) % a.monsters.length];
  const maxHp = monsterHpFor(area, wave, isBoss);
  mon = { name: src.n, ic: src.ic, c: src.c, maxHp, hp: maxHp, isBoss, gold: monsterGoldFor(area, wave, isBoss) };
  renderMonster();
}

let deadLock = false;
let lastInstaKill = 0;   // timestamp of the last Instant Kill proc (10s cooldown)
function damageMonster(amount, opts) {
  if (!mon || deadLock) return;
  opts = opts || {};
  mon.hp -= amount;
  showHitsplat(amount, opts);
  const el = document.getElementById("monster");
  el.classList.remove("hurt"); void el.offsetWidth; el.classList.add("hurt");
  if (mon.hp <= 0) killMonster(); else updateHp();
}
function killMonster() {
  deadLock = true;
  const reward = mon.gold;
  state.gold += reward; state.totalKills += 1;
  const el = document.getElementById("monster");
  el.classList.add("dying"); showGoldDrop(reward);
  const wasBoss = mon.isBoss, area = state.currentArea;
  setTimeout(() => {
    el.classList.remove("dying");
    if (wasBoss) {
      state.areaTier[area] = tierOf(area) + 1;
      const hasNext = area + 1 < AREAS.length;
      const firstClear = hasNext && !state.unlocked[area + 1];
      if (firstClear) {
        state.unlocked[area + 1] = true;
        state.currentArea = area + 1;   // auto-progress to the next region on first clear
        toast(AREAS[area].boss.n + " defeated! Advancing to " + AREAS[area + 1].name + "!");
      } else {
        toast(AREAS[area].boss.n + " defeated! Tier " + toRoman(tierOf(area)) + " cleared.");
      }
      state.wave = 1; renderAreas();
    } else { state.wave += 1; }
    deadLock = false; spawnMonster(); save(true); refreshStats();
  }, 340);
  refreshStats();
}
function onMonsterClick() {
  if (deadLock || !mon) return;
  // Instant Kill perk — non-boss only, respects the 10s cooldown
  if (!mon.isBoss && instaChance() > 0 && (Date.now() - lastInstaKill >= INSTA_COOLDOWN)
      && Math.random() < instaChance()) {
    lastInstaKill = Date.now();
    damageMonster(mon.hp, { insta:true });
    return;
  }
  // Critical Strike perk — x10 click damage, no cooldown
  const crit = critChance() > 0 && Math.random() < critChance();
  let dmg = clickDamage(); if (crit) dmg *= CRIT_MULT;
  damageMonster(dmg, { crit });
}
function dpsTick() {
  if (deadLock || !mon) return;
  const perTick = dps() / 10; if (perTick <= 0) return;
  mon.hp -= perTick; if (mon.hp <= 0) killMonster(); else updateHp();
}

/* =========================================================
   RENDER — combat
   ========================================================= */
function renderMonster() {
  const el = document.getElementById("monster");
  el.innerHTML = icon(mon.ic, mon.c);
  el.classList.toggle("boss", mon.isBoss);
  document.getElementById("mon-name").textContent = mon.name;
  document.getElementById("mon-sub").textContent =
    AREAS[state.currentArea].name + " \u00b7 Tier " + toRoman(tierOf(state.currentArea) + 1);
  document.getElementById("wave-label").textContent =
    mon.isBoss ? "Boss Wave" : ("Wave " + state.wave + " / " + WAVES_PER_AREA);
  document.getElementById("boss-flag").style.visibility = mon.isBoss ? "visible" : "hidden";
  updateHp();
}
function updateHp() {
  const pct = Math.max(0, mon.hp / mon.maxHp) * 100;
  const fill = document.getElementById("hp-fill");
  fill.style.width = pct + "%";
  fill.style.background = "linear-gradient(180deg,"
    + (pct > 50 ? "#58c758,#3fa63f" : pct > 22 ? "#c7a53f,#a67f14" : "#c75050,#a41414") + ")";
  document.getElementById("hp-text").textContent =
    fmt(Math.max(0, Math.ceil(mon.hp))) + " / " + fmt(mon.maxHp);
}
function showHitsplat(amount, opts) {
  opts = opts || {};
  const stage = document.getElementById("stage");
  const s = document.createElement("div");
  s.className = "hitsplat" + (opts.insta ? " insta" : opts.crit ? " crit" : "") + (amount <= 0 ? " zero" : "");
  s.textContent = opts.insta ? "KILL!" : fmt(Math.round(amount));
  const rect = stage.getBoundingClientRect();
  s.style.left = (rect.width / 2 + (Math.random() * 70 - 35)) + "px";
  s.style.top  = (rect.height / 2 + (Math.random() * 50 - 25)) + "px";
  stage.appendChild(s); setTimeout(() => s.remove(), 800);
}
function showGoldDrop(amount) {
  const stage = document.getElementById("stage");
  const d = document.createElement("div");
  d.className = "gold-drop"; d.textContent = "+" + fmt(amount) + " gp";
  d.style.left = "50%"; d.style.top = "38%";
  stage.appendChild(d); setTimeout(() => d.remove(), 1100);
}

/* =========================================================
   RENDER — areas
   ========================================================= */
function diffPips(i) {
  const d = areaDifficulty(i);
  let pips = '<span class="lbl">DANGER</span>';
  for (let k = 1; k <= 5; k++) pips += '<span class="pip' + (k <= d ? ' on' : '') + '"></span>';
  return '<span class="a-diff">' + pips + '</span>';
}
function renderAreas() {
  const list = document.getElementById("area-list");
  list.innerHTML = "";
  AREAS.forEach((a, i) => {
    const unlocked = !!state.unlocked[i], tier = tierOf(i);
    const btn = document.createElement("button");
    btn.className = "area-btn" + (i === state.currentArea ? " active" : "");
    btn.disabled = !unlocked;
    let name, sub;
    if (unlocked) {
      name = a.name + (tier > 0 ? '<span class="a-tier">' + toRoman(tier + 1) + '</span>' : '');
      sub = tier > 0 ? ("Cleared \u00d7" + tier + " \u00b7 Boss: " + a.boss.n) : ("Boss: " + a.boss.n);
    } else {
      name = a.name + '<span class="lock">' + icon("lock", "#b7a077") + '</span>';
      sub = "Locked \u00b7 Defeat " + AREAS[i - 1].boss.n;
    }
    btn.innerHTML = '<span class="a-name">' + name + '</span><span class="a-sub">' + sub + '</span>' + diffPips(i);
    if (unlocked) btn.onclick = () => selectArea(i);
    list.appendChild(btn);
  });
}
function selectArea(i) {
  if (!state.unlocked[i]) return;
  state.currentArea = i; state.wave = 1; deadLock = false;
  renderAreas(); spawnMonster(); save(true);
}

/* =========================================================
   RENDER — shop
   ========================================================= */
function mkBuy(o) {
  const b = document.createElement("button");
  b.className = "buy" + (o.owned ? " owned" : "");
  if (o.disabled) b.disabled = true;
  let lines = "";
  (o.lines || []).forEach(l => {
    if (!l) return;
    const isObj = (typeof l === "object");
    const text = isObj ? l.t : l;
    lines += '<span class="b-line' + (isObj && l.boost ? ' boost' : '') + '">' + text + '</span>';
  });
  const right = (o.cost == null)
    ? '<span class="b-cost"><span class="b-owned">' + (o.tag || "Owned") + '</span></span>'
    : '<span class="b-cost coin">' + fmt(o.cost) + '</span>';
  b.innerHTML =
    '<span class="ico">' + icon(o.ic, o.c) + '</span>' +
    '<span class="info"><span class="b-name">' + o.name +
      (o.ownedCount ? ' <span class="b-tag">\u00d7' + o.ownedCount + '</span>' : '') +
      (o.tag && o.cost != null ? ' <span class="b-tag">' + o.tag + '</span>' : '') +
    '</span>' + lines + '</span>' + right;
  // Mark buttons whose only gate is gold, so affordability can refresh live.
  if (o.buyable && o.cost != null) b.dataset.cost = o.cost;
  return b;
}
function renderShop() {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === shopTab));
  const body = document.getElementById("shop-body");
  body.innerHTML = "";

  if (shopTab === "weapons") {
    WEAPONS.forEach((w, i) => {
      // hide Fists and any tier below the one you've already bought
      if (i === 0 || i < state.weaponTier) return;
      const owned = state.weaponTier >= i, isNext = state.weaponTier === i - 1;
      const b = mkBuy({
        ic: w.ic, c: w.c, name: w.name,
        lines: ["Click damage " + fmt(w.dmg)],
        cost: owned ? null : w.cost, owned,
        disabled: !owned && (!isNext || state.gold < w.cost),
        buyable: !owned && isNext,
        tag: owned ? "Equipped" : (isNext ? null : "Locked"),
      });
      if (!owned && isNext) b.onclick = () => {
        if (state.gold < w.cost) return;
        state.gold -= w.cost; state.weaponTier = i; toast("Equipped " + w.name + "!"); afterBuy();
      };
      body.appendChild(b);
    });
  }

  if (shopTab === "strength") {
    // 1) Train Strength — also builds Prestige
    {
      const lvl = state.strengthLevel, cost = strengthCost();
      const mult = milestoneMult(lvl, STR_MILESTONES), next = nextMilestone(lvl, STR_MILESTONES);
      const boostLine = (mult > 1)
        ? { t: "Prestige \u00d7" + mult + (next ? " \u00b7 next \u00d72 at Lv " + next : " \u00b7 MAX"), boost:true }
        : { t: "First prestige at Lv " + STR_MILESTONES[0], boost:true };
      const b = mkBuy({
        ic:"strength", c:"#c98a3a", name:"Train Strength",
        lines: ["+" + (STR_PCT * 100) + "% click damage / level",
                { t:"Level " + lvl + " \u00b7 +" + Math.round(strBonus() * 100) + "% dmg", boost:true }, boostLine],
        cost, disabled: state.gold < cost, buyable:true,
      });
      b.onclick = () => { const c = strengthCost(); if (state.gold < c) return; state.gold -= c; state.strengthLevel++; afterBuy(); };
      body.appendChild(b);
    }
    // 2) Piety
    {
      const lvl = state.pietyLevel, cost = pietyCost();
      const b = mkBuy({
        ic:"prayer", c:"#e8d070", name:"Piety",
        lines: ["+" + (PIETY_PCT * 100) + "% click damage / level",
                { t:"Level " + lvl + " \u00b7 +" + Math.round(pietyBonus() * 100) + "% dmg", boost:true }],
        cost, disabled: state.gold < cost, buyable:true,
      });
      b.onclick = () => { const c = pietyCost(); if (state.gold < c) return; state.gold -= c; state.pietyLevel++; afterBuy(); };
      body.appendChild(b);
    }
    // 3) Overloads
    {
      const lvl = state.overloadLevel, cost = overloadCost();
      const b = mkBuy({
        ic:"potion", c:"#3fa06a", name:"Overloads",
        lines: ["+" + (OVER_PCT * 100) + "% click damage / level",
                { t:"Level " + lvl + " \u00b7 +" + Math.round(overBonus() * 100) + "% dmg", boost:true }],
        cost, disabled: state.gold < cost, buyable:true,
      });
      b.onclick = () => { const c = overloadCost(); if (state.gold < c) return; state.gold -= c; state.overloadLevel++; afterBuy(); };
      body.appendChild(b);
    }
    const note = document.createElement("div");
    note.style.cssText = "padding:8px 4px;color:var(--ink-dim);font-size:12px;line-height:1.5";
    note.textContent = "Train Strength, Piety and Overloads add together into one click-damage bonus (they no longer compound). Train Strength also builds Prestige: Lv 10 (\u00d72), 25 (\u00d74), 50 (\u00d78)\u2026 then every +25 doubles again, and Prestige multiplies your whole click.";
    body.appendChild(note);
  }

  if (shopTab === "familiars") {
    // buy-amount toggle: x1 / x5 / x25
    const qtyRow = document.createElement("div");
    qtyRow.className = "qty-row";
    [1, 5, 25].forEach(q => {
      const qb = document.createElement("button");
      qb.className = "qty-btn" + (famBuyQty === q ? " active" : "");
      qb.textContent = "\u00d7" + q;
      qb.onclick = () => { famBuyQty = q; renderShop(); };
      qtyRow.appendChild(qb);
    });
    body.appendChild(qtyRow);

    FAMILIARS.forEach(f => {
      const owned = state.familiars[f.key] || 0;
      const cost = familiarCostN(f, famBuyQty);
      const mult = milestoneMult(owned, FAM_MILESTONES), next = nextMilestone(owned, FAM_MILESTONES);
      let boostLine;
      if (mult > 1) boostLine = { t: "Prestige \u00d7" + mult + (next ? " \u00b7 next \u00d72 at " + next : " \u00b7 MAX"), boost:true };
      else boostLine = { t: "Prestige \u00d72 at " + next, boost:true };
      const b = mkBuy({
        ic: f.ic, c: f.c, name: f.name, ownedCount: owned,
        lines: ["+" + fmt(f.dps) + " dmg/sec each", boostLine],
        cost, disabled: state.gold < cost, buyable:true,
        tag: famBuyQty > 1 ? "Buy \u00d7" + famBuyQty : null,
      });
      b.onclick = () => {
        const c = familiarCostN(f, famBuyQty); if (state.gold < c) return;
        state.gold -= c; state.familiars[f.key] = (state.familiars[f.key] || 0) + famBuyQty; afterBuy();
      };
      body.appendChild(b);
    });
    const note = document.createElement("div");
    note.style.cssText = "padding:8px 4px;color:var(--ink-dim);font-size:12px;line-height:1.5";
    note.textContent = "Prestige: reaching 10, 25, 50, 75, 100\u2026 (then every +25) of a familiar doubles that familiar's damage each time. Use \u00d75 / \u00d725 above to buy in bulk.";
    body.appendChild(note);
  }

  if (shopTab === "perks") {
    PERKS.forEach(p => {
      const lvl = state.perks[p.key];
      const isProc = (p.key === "instakill" || p.key === "crit");
      const chance = p.key === "instakill" ? instaChance() : p.key === "crit" ? critChance() : 0;
      const cap    = p.key === "instakill" ? INSTA_CAP     : p.key === "crit" ? CRIT_CAP     : 0;
      const maxed  = isProc && chance >= cap;
      const cost = perkCost(p);
      const lines = [p.desc, { t:"Level " + lvl, boost:true }];
      if (isProc)
        lines.push({ t:"Chance " + (chance * 100).toFixed(1) + "%  " + (maxed ? "(MAX)" : "(max " + (cap * 100) + "%)"), boost:true });
      const b = mkBuy({
        ic: p.ic, c: p.c, name: p.name, lines,
        cost: maxed ? null : cost, owned: maxed,
        disabled: maxed || state.gold < cost, buyable: !maxed,
        tag: maxed ? "Maxed" : null,
      });
      if (!maxed) b.onclick = () => { const c = perkCost(p); if (state.gold < c) return; state.gold -= c; state.perks[p.key]++; afterBuy(); };
      body.appendChild(b);
    });
    const note = document.createElement("div");
    note.style.cssText = "padding:8px 4px;color:var(--ink-dim);font-size:12px;line-height:1.5";
    note.textContent = "Instant Kill and Critical Strike trigger on your clicks. Each level adds a little chance, both cap at 10%, and they climb slowly \u2014 maxing them is a long-term goal.";
    body.appendChild(note);
  }
}
function afterBuy() { refreshStats(); renderShop(); save(true); }

/* =========================================================
   STATS + HELPERS
   ========================================================= */
function refreshStats() {
  const goldTxt = fmt(Math.floor(state.gold));
  document.getElementById("stat-gold").textContent  = goldTxt;
  const hud = document.getElementById("hud-gold"); if (hud) hud.textContent = goldTxt;
  document.getElementById("stat-click").textContent = fmt(clickDamage());
  document.getElementById("stat-dps").textContent   = fmt(dps());
  document.getElementById("stat-kills").textContent = fmt(state.totalKills);
  const d = dps();
  document.getElementById("dps-note").textContent =
    d > 0 ? ("Your familiars deal " + fmt(d) + " damage/sec automatically.")
          : "Buy a Summoning familiar to deal damage automatically.";
  refreshAffordability();
}
// Enable/disable purchase buttons as gold changes, without rebuilding the shop
// (so scroll position and the active tab are preserved).
function refreshAffordability() {
  const g = state.gold;
  document.querySelectorAll("#shop-body .buy[data-cost]").forEach(b => {
    b.disabled = g < (+b.dataset.cost);
  });
}
function fmt(n) {
  n = Math.round(n);
  if (n < 1000) return "" + n;
  const units = ["","K","M","B","T","Qa","Qi","Sx","Sp","Oc"]; let u = 0;
  while (n >= 1000 && u < units.length - 1) { n /= 1000; u++; }
  return (n < 10 ? n.toFixed(2) : n < 100 ? n.toFixed(1) : Math.floor(n)) + units[u];
}
function toRoman(num) {
  if (num <= 0) return "0";
  const map = [[1000,"M"],[900,"CM"],[500,"D"],[400,"CD"],[100,"C"],[90,"XC"],[50,"L"],[40,"XL"],[10,"X"],[9,"IX"],[5,"V"],[4,"IV"],[1,"I"]];
  let r = ""; for (const pair of map) { while (num >= pair[0]) { r += pair[1]; num -= pair[0]; } } return r;
}
let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

/* =========================================================
   WIRING + LOOP
   ========================================================= */
function init() {
  const loaded = load();
  document.getElementById("monster").addEventListener("click", onMonsterClick);
  document.querySelectorAll(".tab").forEach(t =>
    t.addEventListener("click", () => { shopTab = t.dataset.tab; renderShop(); }));
  document.getElementById("reset-btn").onclick = () => {
    if (confirm("Reset all progress? This cannot be undone.")) {
      state = freshState();
      try { localStorage.removeItem(SAVE_KEY); } catch (e) {}
      famBuyQty = 1;
      deadLock = false; renderAreas(); renderShop(); spawnMonster(); refreshStats();
      toast("Progress reset. Welcome back to Misthalin!");
    }
  };
  if (!state.unlocked[state.currentArea]) state.currentArea = 0;
  renderAreas(); renderShop(); spawnMonster(); refreshStats();
  setInterval(dpsTick, 100);
  // keep buy buttons / gold live even while idling on one tab
  setInterval(refreshStats, 300);
  setInterval(() => save(true), 15000);
  window.addEventListener("beforeunload", () => save(true));

  // floating gold badge — visible once the header scrolls out of view
  const hud = document.getElementById("gold-hud");
  const onScroll = () => hud.classList.toggle("show", window.scrollY > 120);
  window.addEventListener("scroll", onScroll, { passive: true });
  onScroll();

  if (!loaded) toast("Welcome to Gielinor! Click the chicken to begin.");
}
document.addEventListener("DOMContentLoaded", init);
</script>
</body>
